<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interview Confirmation — Professor Griff · The Static</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0B0D10;
    --panel: #15181C;
    --panel-edge: #232830;
    --text: #EDE7DC;
    --text-dim: #9AA0A8;
    --accent: #FF8A3D;
    --live: #5CE1B8;
    --field: #1C2025;
  }
  *{ box-sizing: border-box; }
  html, body{
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body{
    padding: 32px 20px 60px;
    display: flex;
    justify-content: center;
  }
  .sheet{
    width: 100%;
    max-width: 640px;
    border: 1px solid var(--panel-edge);
    background: var(--panel);
    border-radius: 4px;
    overflow: hidden;
  }
  header{
    padding: 28px;
    border-bottom: 1px solid var(--panel-edge);
  }
  .eyebrow{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--live);
    margin: 0 0 8px;
  }
  h1{
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 800;
    font-size: clamp(26px, 6vw, 38px);
    line-height: 1.05;
    margin: 0 0 8px;
    text-transform: uppercase;
  }
  h1 span{ color: var(--accent); }
  .meta{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  form{
    padding: 24px 28px 28px;
  }
  fieldset{
    border: none;
    margin: 0 0 20px;
    padding: 0;
  }
  legend{
    font-family: 'Big Shoulders Display', sans-serif;
    font-weight: 800;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--accent);
    margin-bottom: 12px;
    padding: 0;
  }
  .row{
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
  }
  .row > div{ flex: 1; }
  label{
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  input, select, textarea{
    width: 100%;
    background: var(--field);
    border: 1px solid var(--panel-edge);
    border-radius: 2px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
  }
  input:focus, select:focus, textarea:focus{
    outline: none;
    border-color: var(--accent);
  }
  textarea{ resize: vertical; min-height: 80px; }
  .field{ margin-bottom: 12px; }
  .submit{
    width: 100%;
    background: var(--live);
    color: var(--bg);
    border: none;
    border-radius: 2px;
    padding: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
  .submit:hover{ opacity: 0.85; }
  .footnote{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 12px;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
<main class="sheet">
  <header>
    <p class="eyebrow">The Static · Interview Confirmation</p>
    <h1>Professor <span>Griff</span></h1>
    <p class="meta">Confirm the details below and send to the booking inbox.</p>
  </header>

  <form action="https://formsubmit.co/houseofmedia.marketing@gmail.com" method="POST">
    <input type="hidden" name="_subject" value="Interview Confirmation — Professor Griff (The Static)">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_captcha" value="false">

    <fieldset>
      <legend>Guest</legend>
      <div class="field">
        <label for="guest_name">Guest name</label>
        <input type="text" id="guest_name" name="Guest name" value="Professor Griff" required>
      </div>
      <div class="field">
        <label for="guest_contact">Guest contact (email or phone)</label>
        <input type="text" id="guest_contact" name="Guest contact" placeholder="Email or phone number">
      </div>
    </fieldset>

    <fieldset>
      <legend>Schedule</legend>
      <div class="row">
        <div>
          <label for="interview_date">Date</label>
          <input type="date" id="interview_date" name="Interview date" value="2026-06-15" required>
        </div>
        <div>
          <label for="interview_time">Time</label>
          <input type="time" id="interview_time" name="Interview time" value="12:00" required>
        </div>
      </div>
      <div class="field">
        <label for="platform">Platform / location</label>
        <select id="platform" name="Platform">
          <option value="Phone">Phone</option>
          <option value="Zoom">Zoom</option>
          <option value="Google Meet">Google Meet</option>
          <option value="In person">In person</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field">
        <label for="link">Call link / address (if applicable)</label>
        <input type="text" id="link" name="Call link or address" placeholder="https:// or street address">
      </div>
    </fieldset>

    <fieldset>
      <legend>For the issue</legend>
      <div class="field">
        <label for="topics">Topics covered</label>
        <textarea id="topics" name="Topics covered" placeholder="Independent media, hip-hop history, community building..."></textarea>
      </div>
      <div class="field">
        <label for="card_type">Card type for The Static</label>
        <select id="card_type" name="Card type">
          <option value="Featured / Cover">Featured / Cover</option>
          <option value="Standard issue card">Standard issue card</option>
        </select>
      </div>
      <div class="field">
        <label for="notes">Notes</label>
        <textarea id="notes" name="Notes" placeholder="Anything the team should know before the call"></textarea>
      </div>
    </fieldset>

    <button type="submit" class="submit">Send confirmation</button>
    <p class="footnote">Submits to houseofmedia.marketing@gmail.com</p>
  </form>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHAT'S ON NOW — STV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
--gold:#d8b25a;
--gold2:#f3d889;
--bg:#04070d;
--bg2:#0b1220;
--card:#111827;
--text:#f5f5f5;
--muted:#9ca3af;
--border:rgba(255,255,255,.08);
--radius:24px;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'DM Sans',sans-serif;

background:#04070d;

color:white;

overflow-x:hidden;

}


/* Animated Background */

body::before{

content:"";

position:fixed;

inset:0;

background:url("stv-gif.gif") center center/cover no-repeat;

filter:

blur(24px)

brightness(.28)

saturate(1.25);

transform:scale(1.15);

z-index:-3;

}

body::after{

content:"";

position:fixed;

inset:0;

background:

linear-gradient(

180deg,

rgba(4,7,13,.2),

rgba(4,7,13,.75),

rgba(4,7,13,.96)

);

z-index:-2;

}
    .header{

position:fixed;

top:0;

left:0;

right:0;

height:72px;

display:flex;

justify-content:space-between;

align-items:center;

padding:0 34px;

background:rgba(6,10,20,.55);

backdrop-filter:blur(22px);

border-bottom:1px solid rgba(255,255,255,.06);

z-index:1000;

}

.logo{

display:flex;

align-items:center;

gap:16px;

font-weight:700;

font-size:22px;

letter-spacing:2px;

}

.logo img{

width:46px;

height:46px;

border-radius:50%;

}

nav{

display:flex;

gap:12px;

}

nav a{

text-decoration:none;

color:#999;

padding:12px 20px;

border-radius:100px;

transition:.25s;

font-weight:700;

}

nav a:hover{

background:rgba(255,255,255,.06);

color:white;

}

nav .active{

background:linear-gradient(90deg,var(--gold),#a77d2d);

color:black;

}

.live{

display:flex;

align-items:center;

gap:10px;

font-weight:800;

letter-spacing:3px;

color:var(--gold2);

}

.live-dot{

width:10px;

height:10px;

border-radius:50%;

background:var(--gold2);

box-shadow:0 0 18px var(--gold2);

animation:pulse 1.5s infinite;

}

@keyframes pulse{

50%{

opacity:.3;

transform:scale(.75);

}

}
 .hero{

position:relative;

height:88vh;

display:flex;

align-items:flex-end;

padding:120px 80px 70px;

overflow:hidden;

}

.hero-video{

position:absolute;

inset:0;

z-index:0;

}

.hero-video img{

width:100%;

height:100%;

object-fit:cover;

animation:zoomHero 25s linear infinite alternate;

}

@keyframes zoomHero{

from{

transform:scale(1);

}

to{

transform:scale(1.12);

}

}

.hero-overlay{

position:absolute;

inset:0;

background:

linear-gradient(

180deg,

rgba(0,0,0,.15),

rgba(0,0,0,.35),

rgba(4,7,13,.98)

);

z-index:1;

}

.hero-content{

position:relative;

z-index:2;

max-width:700px;

}

.hero-badge{

display:inline-block;

background:var(--gold);

color:black;

padding:8px 18px;

border-radius:100px;

font-weight:800;

margin-bottom:20px;

}

.hero h1{

font-size:82px;

line-height:.9;

margin-bottom:20px;

}

.hero h1 span{

display:block;

color:var(--gold);

}

.hero p{

font-size:22px;

color:#d0d0d0;

line-height:1.7;

max-width:520px;

margin-bottom:34px;

}   
  </style>
</head>
  <body>

<header class="header">

<div class="logo">

<img src="stvlogo1.jpg" alt="STV">

<span>SANECA TV</span>

</div>

<nav>

<a href="/radio">Radio</a>

<a class="active" href="/watch">TV</a>

<a href="#">Talk</a>

</nav>

<div class="live">

<div class="live-dot"></div>

LIVE

</div>

</header>


<section class="hero">

<div class="hero-video">

<img src="stv-gif.gif">

</div>

<div class="hero-overlay"></div>

<div class="hero-content">

<div class="hero-badge">

NOW PREMIERING

</div>

<h1>

Professor Griff

<span>REBEL</span>

</h1>

<p>

A Saneca TV Original Documentary.

Streaming now.

</p>

<div class="hero-buttons">

<button id="watchLive">

▶ Watch Live

</button>

<button>

Browse Shows

</button>

</div>

</div>

</section>


<section class="live-bar">

<div>

● LIVE NOW

</div>

<div>

Community Channel

</div>

<div>

Broadcasting Worldwide

</div>

</section>


<section class="channels">

<h2>LIVE CHANNELS</h2>

<div class="channel-grid">

<div class="channel-card active">

<div class="number">01</div>

<h3>Community</h3>

<p>Broadcasting Live</p>

</div>

<div class="channel-card">

<div class="number">02</div>

<h3>Studio</h3>

<p>Live Room</p>

</div>

<div class="channel-card">

<div class="number">03</div>

<h3>24/7</h3>

<p>Always On</p>

</div>

</div>

</section>


<section id="playerSection">

<iframe

id="mainFrame"

src="/Ch1/"

allowfullscreen

allow="autoplay; fullscreen"

></iframe>

</section>

</body>
</html>

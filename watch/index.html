<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WHAT'S ON NOW — STV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-navy: #060a14;
      --panel: rgba(14, 20, 34, 0.62);
      --panel-solid: #0e1422;
      --panel-border: rgba(201, 164, 76, 0.18);
      --text: #f3f1ea;
      --muted: #a9adba;
      --gold: #c9a44c;
      --gold-bright: #e6c878;
      --navy-deep: #060a14;
      --glass-hairline: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      color: var(--text);
      font-family: 'DM Sans', Arial, sans-serif;
      position: relative;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: url("stv-gif.gif");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -2;
      transform: scale(1.05);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(6, 10, 20, 0.35), rgba(4, 6, 12, 0.86) 70%),
        linear-gradient(180deg, rgba(4, 6, 12, 0.75), rgba(4, 6, 12, 0.92));
      z-index: -1;
    }

    /* ============ TOPBAR ============ */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 26px;
      background: rgba(9, 13, 24, 0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--panel-border);
      letter-spacing: 1px;
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .topbar .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      font-family: 'Bebas Neue', Arial, sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
    }

    .topbar-logo {
      width: 30px; height: 30px; border-radius: 50%;
      overflow: hidden; flex-shrink: 0;
      border: 1px solid var(--panel-border);
    }
    .topbar-logo img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .live {
      color: var(--gold-bright);
      font-weight: 700;
      letter-spacing: 2px;
      display: flex; align-items: center; gap: 8px;
    }
    .live .pulse-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold-bright);
      box-shadow: 0 0 8px rgba(230, 200, 120, 0.8);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }

    .topbar-right { display: flex; align-items: center; gap: 14px; }

    .suite-nav {
      display: flex; align-items: center; gap: 2px;
      background: rgba(6,10,20,0.5); border: 1px solid var(--panel-border);
      border-radius: 999px; padding: 3px;
    }
    .suite-nav a {
      text-decoration: none; color: var(--muted); font-size: 11px; font-weight:700;
      letter-spacing: .3px; padding: 6px 12px; border-radius: 999px;
      text-transform: none; transition: all .15s;
    }
    .suite-nav a:hover { color: var(--text); background: rgba(255,255,255,0.06); }
    .suite-nav a.current { background: linear-gradient(90deg, var(--gold), #a5813a); color: #10131c; }

    /* ============ HERO PROMO ============ */
    .hero-reel {
      max-width: 1400px;
      margin: 22px auto 0;
      padding: 0 26px;
    }
    .promo {
      position: relative;
      aspect-ratio: 21 / 7;
      border-radius: 14px;
      overflow: hidden;
      background: #05070d;
      border: 1px solid var(--panel-border);
      box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    }
    .promo::before {
      content: "STV ON-AIR REEL";
      position: absolute;
      top: 12px; left: 14px; z-index: 4;
      font-family: 'Bebas Neue', Arial, sans-serif;
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--navy-deep);
      background: linear-gradient(90deg, var(--gold-bright), var(--gold));
      padding: 3px 10px;
      border-radius: 4px;
    }
    .promo-slide {
      position: absolute; inset: 0;
      opacity: 0;
      animation: promoFade 12s infinite;
    }
    .promo-slide img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      filter: saturate(1.08) contrast(1.03);
      animation: promoZoom 12s infinite;
      transform-origin: center;
    }
    .promo-slide:nth-child(1) { animation-delay: 0s; }
    .promo-slide:nth-child(2) { animation-delay: 4s; }
    .promo-slide:nth-child(3) { animation-delay: 8s; }
    .promo-slide:nth-child(1) img { animation-delay: 0s; }
    .promo-slide:nth-child(2) img { animation-delay: 4s; }
    .promo-slide:nth-child(3) img { animation-delay: 8s; }

    @keyframes promoFade {
      0%      { opacity: 0; }
      4%      { opacity: 1; }
      30%     { opacity: 1; }
      37%     { opacity: 0; }
      100%    { opacity: 0; }
    }
    @keyframes promoZoom {
      0%   { transform: scale(1.0); }
      33%  { transform: scale(1.08); }
      100% { transform: scale(1.08); }
    }

    .promo-scan {
      position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(180deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 3px);
      mix-blend-mode: overlay;
    }
    .promo-vignette {
      position: absolute; inset: 0; z-index: 2; pointer-events: none;
      background:
        linear-gradient(180deg, rgba(6,10,20,0.55), transparent 30%, transparent 65%, rgba(6,10,20,0.75)),
        radial-gradient(ellipse at center, transparent 55%, rgba(4,6,12,0.5) 100%);
    }
    .promo-tag {
      position: absolute; left: 14px; bottom: 12px; z-index: 4;
      display: flex; align-items: center; gap: 8px;
    }
    .promo-tag .live-chip {
      display: flex; align-items: center; gap: 6px;
      background: rgba(6,10,20,0.65);
      border: 1px solid var(--panel-border);
      color: var(--gold-bright);
      font-size: 10px; font-weight: 800; letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 10px; border-radius: 5px;
    }
    .promo-tag .live-chip .dot {
      width: 7px; height: 7px; box-shadow: 0 0 6px rgba(230,200,120,0.8);
    }
    .promo-dots {
      position: absolute; right: 14px; bottom: 14px; z-index: 4;
      display: flex; gap: 6px;
    }
    .promo-dots span {
      width: 22px; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.25);
      overflow: hidden; position: relative;
    }
    .promo-dots span::after {
      content: ""; position: absolute; inset: 0;
      background: var(--gold-bright);
      transform: scaleX(0); transform-origin: left;
      animation: promoDot 12s infinite;
    }
    .promo-dots span:nth-child(1)::after { animation-delay: 0s; }
    .promo-dots span:nth-child(2)::after { animation-delay: 4s; }
    .promo-dots span:nth-child(3)::after { animation-delay: 8s; }
    @keyframes promoDot {
      0%   { transform: scaleX(0); }
      2%   { transform: scaleX(0); }
      33%  { transform: scaleX(1); }
      100% { transform: scaleX(1); }
    }

    /* ============ TUNER ============ */
    .tuner {
      max-width: 1400px;
      margin: 18px auto 0;
      padding: 0 26px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .tuner-label {
      font-family: 'Bebas Neue', Arial, sans-serif;
      font-size: 13px; letter-spacing: 3px; color: var(--muted);
      flex-shrink: 0;
    }
    .channel-buttons {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .chan-btn {
      position: relative;
      display: flex; align-items: baseline; gap: 8px;
      background: rgba(14, 20, 34, 0.65);
      border: 1px solid var(--panel-border);
      color: var(--text);
      padding: 10px 18px;
      border-radius: 10px;
      cursor: pointer;
      font-family: 'DM Sans', Arial, sans-serif;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: all .18s ease;
      backdrop-filter: blur(8px);
    }
    .chan-btn .num {
      font-family: 'Bebas Neue', Arial, sans-serif;
      font-size: 20px;
      color: var(--gold-bright);
      line-height: 1;
    }
    .chan-btn .name { font-size: 12px; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; }
    .chan-btn:hover { border-color: var(--gold); background: rgba(201,164,76,0.1); }
    .chan-btn.active {
      background: linear-gradient(90deg, var(--gold), #a5813a);
      border-color: var(--gold-bright);
      box-shadow: 0 0 22px rgba(201,164,76,0.35);
    }
    .chan-btn.active .num,
    .chan-btn.active .name { color: #10131c; }

    /* ============ LAYOUT ============ */
    .container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 22px;
      padding: 18px 26px 26px;
      align-items: start;
      max-width: 1400px;
      margin: 0 auto;
    }

    .side-stack { display: flex; flex-direction: column; gap: 18px; }

    .player-box {
      position: relative;
      background: #05070d;
      border-radius: 16px;
      overflow: hidden;
      min-height: 500px;
      border: 1px solid var(--panel-border);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.02) inset;
    }

    #mainFrame {
      width: 100%; height: 500px;
      display: block; border: none; background: black;
      position: relative; z-index: 1;
    }

    .chan-id {
      position: absolute; top: 18px; right: 18px; z-index: 6;
      background: rgba(6,10,20,0.68);
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      padding: 6px 12px;
      font-family: 'Bebas Neue', Arial, sans-serif;
      font-size: 16px; letter-spacing: 1px;
      color: var(--gold-bright);
      pointer-events: none;
    }

    .info {
      background: var(--panel);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
      padding: 22px;
      border: 1px solid var(--panel-border);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .status {
      display: flex; gap: 10px; align-items: center;
      margin-bottom: 14px; font-size: 12px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
    }
    .dot {
      width: 9px; height: 9px; background: var(--gold-bright);
      border-radius: 50%; box-shadow: 0 0 8px rgba(230, 200, 120, 0.8);
    }

    .title { font-size: 22px; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.3px; }
    .artist { color: var(--muted); margin-bottom: 4px; font-size: 14px; }

    .info hr { border: none; border-top: 1px solid var(--glass-hairline); margin: 18px 0; }

    .info-footer {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    }

    .qr-wrap { text-align: center; padding: 4px 0 6px; }
    .qr-wrap img { width: 200px; height: 200px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
    .qr-caption { text-align: center; color: var(--muted); font-size: 13px; margin-top: 10px; }

    .btn {
      display: block; margin: 14px auto 0; padding: 11px 16px;
      border-radius: 8px; border: 1px solid var(--panel-border);
      color: var(--text); text-decoration: none; font-size: 12px;
      letter-spacing: 1px; text-transform: uppercase; text-align: center;
      background: rgba(201, 164, 76, 0.08);
      transition: border-color 0.2s ease, background 0.2s ease;
      max-width: 220px;
    }
    .btn:hover { border-color: var(--gold); background: rgba(201, 164, 76, 0.16); }

    @media (max-width: 1100px) {
      .container { grid-template-columns: 1fr; }
      .reel-strip { grid-template-columns: 1fr 1fr 1fr; }
    }
    @media (max-width: 700px) {
      #mainFrame, .player-box { min-height: 320px; height: 320px; }
      .reel-strip { grid-template-columns: 1fr; }
      .tuner { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <div class="topbar-logo"><img src="stvlogo-2.jpg" alt="Station logo" /></div>
      WHAT'S ON
    </div>
    <div class="topbar-right">
      <nav class="suite-nav">
        <a href="/radio">RADIO</a>
        <a href="watch" class="current">TV</a>
        <a href="https://invite.cam/U2FsdGVkX1/qKqyWqix+XqAIu/59EQQQxkzanfVoczAyCOzn6fzlFX/mJREOioGcZSRlmsceSTotsPsTLaZ3mw==" target="_blank" rel="noopener">TALK</a>
      </nav>
      <div class="live"><span class="pulse-dot"></span> LIVE</div>
    </div>
  </div>

  <!-- Hero promo reel: cycles the three images like a station ID / promo -->
  <div class="hero-reel">
    <div class="promo">
      <div class="promo-slide"><img src="stv-gif.gif" alt="STV live motion reel" /></div>
      <div class="promo-slide"><img src="stvlogo-2.jpg" alt="STV station logo" /></div>
      <div class="promo-slide"><img src="IMG_8181.jpg" alt="Station photo" /></div>
      <div class="promo-scan"></div>
      <div class="promo-vignette"></div>
      <div class="promo-tag"><div class="live-chip"><span class="dot"></span>STV</div></div>
      <div class="promo-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- Channel tuner -->
  <div class="tuner">
    <div class="tuner-label">TUNE IN —</div>
    <div class="channel-buttons" id="channelButtons">
      <button class="chan-btn active" data-chan="1"><span class="num">CH 1</span><span class="name">Ch1</span></button>
      <button class="chan-btn" data-chan="2"><span class="num">CH 2</span><span class="name">Live Room</span></button>
      <button class="chan-btn" data-chan="3"><span class="num">CH 3</span><span class="name">247</span></button>
    </div>
  </div>

  <div class="container">

    <div class="player-box">
      <div class="chan-id" id="chanId">CH 1</div>
      <iframe
        id="mainFrame"
        src="/Ch1/"
        allow="camera; microphone; autoplay; fullscreen"
        title="STV Channel Player"
      ></iframe>
    </div>

    <div class="side-stack">

      <div class="info">
        <div class="status"><div class="dot"></div><div>NOW PLAYING</div></div>
        <div class="title" id="title">Channel 1</div>
        <div class="artist" id="artist">Broadcasting now</div>
        <hr />
        <div class="info-footer">XOCO MEDIA PLAYER</div>
      </div>

      <div class="info">
        <div class="status"><div class="dot"></div><div>JOIN BY PHONE / TABLET</div></div>
        <div class="qr-wrap">
          <img
            src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://invite.cam/U2FsdGVkX1%2BQMWbI16QX0ILSVj1jNeskyDKYX3E8G51ClAtp8s0PxmpGtDXJUKfWlotC%2B2reCVz8G6AQGUL2YQ%3D%3D"
            alt="Join QR Code"
          />
        </div>
        <div class="qr-caption">Scan to join on phone or tablet</div>
        <a class="btn" href="https://invite.cam/U2FsdGVkX1+QMWbI16QX0ILSVj1jNeskyDKYX3E8G51ClAtp8s0PxmpGtDXJUKfWlotC+2reCVz8G6AQGUL2YQ==" target="_blank" rel="noopener">
          Open Invite Link
        </a>
      </div>

    </div>
  </div>

<script>
  // Channel definitions — swap the URLs below to match your real paths.
  const CHANNELS = {
    1: {
      src: "/Ch1/",
      label: "CH 1",
      title: "Channel 1",
      sub: "Broadcasting now"
    },
    2: {
      src: "https://vdo.ninja/?scene&room=whatsthe411&roomkey=DfmbmuvdavLBPykP&sas&sl",
      label: "CH 2",
      title: "Live Room",
      sub: "VDO.Ninja live feed"
    },
    3: {
      src: "/247/",
      label: "CH 3",
      title: "24/7 Channel",
      sub: "Scheduled programming"
    }
  };

  const frame = document.getElementById('mainFrame');
  const chanId = document.getElementById('chanId');
  const title = document.getElementById('title');
  const artist = document.getElementById('artist');
  const buttons = document.querySelectorAll('.chan-btn');

  function tune(num){
    const ch = CHANNELS[num];
    if (!ch) return;
    frame.src = ch.src;
    chanId.textContent = ch.label;
    title.textContent = ch.title;
    artist.textContent = ch.sub;
    buttons.forEach(b => b.classList.toggle('active', b.dataset.chan === String(num)));
  }

  buttons.forEach(btn => {
    btn.addEventListener('click', () => tune(btn.dataset.chan));
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STV Live Shop — Saneca TV</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body {
    margin:0;
    background:#111;
    color:#f5f0e6;
    font-family:'Poppins', sans-serif;
}

header {
    padding:30px;
    background:#18130d;
    text-align:center;
}

.logo {
    font-family:'Bebas Neue';
    font-size:55px;
    letter-spacing:3px;
    color:#d6a84f;
}

.tagline {
    font-size:18px;
}

.hero {
    padding:40px;
    text-align:center;
}

.live-box {
    height:450px;
    background:#000;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:35px;
    border:2px solid #d6a84f;
}

.live {
    color:red;
    font-weight:bold;
}

.section {
    padding:40px;
}

.section h2 {
    font-family:'Bebas Neue';
    font-size:42px;
    color:#d6a84f;
}

.cards {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card {
    background:#211a13;
    border-radius:18px;
    padding:25px;
    transition:.3s;
}

.card:hover {
    transform:translateY(-5px);
}

.button {
    display:inline-block;
    background:#d6a84f;
    color:#111;
    padding:12px 25px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
}

.product {
    background:#171717;
}

footer {
    padding:40px;
    text-align:center;
    background:#080808;
}

</style>

</head>

<body>


<header>

<div class="logo">
LIFESTYLE CHANNEL
</div>

<div class="tagline">
Cooking • Garden • Comedy • DIY
</div>

</header>


<section class="hero">

<div class="live-box">

<div class="live-box">
    <iframe
        src="https://vdo.ninja/?scene&room=whatsthe411&roomkey=DfmbmuvdavLBPykP&sas&sl"
        width="100%"
        height="100%"
        frameborder="0"
        allowfullscreen>
    </iframe>
</div>

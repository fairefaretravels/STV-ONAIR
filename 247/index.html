<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STV Radiomeltdown — Live Channel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy-950:#050914;
    --navy-900:#0a1128;
    --navy-800:#101a3a;
    --navy-700:#182450;
    --gold:#c9a24b;
    --gold-bright:#f0d586;
    --text-primary:#f5f3ec;
    --text-muted:#8b93b8;
    --live-red:#e14b4b;
    --break-amber:#e0a83f;
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  html,body{
    height:100%;
    background:var(--navy-950);
    color:var(--text-primary);
    font-family:'Inter',sans-serif;
    overflow:hidden;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important;transition-duration:0.01ms !important;}
  }

  .channel{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:
      radial-gradient(ellipse at top, rgba(24,36,80,0.55), transparent 60%),
      var(--navy-950);
  }

  /* ---------- HEADER ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 22px;
    border-bottom:1px solid rgba(201,162,75,0.18);
    background:linear-gradient(180deg, rgba(10,17,40,0.9), rgba(10,17,40,0.6));
    z-index:5;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }

  .brand .mark{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.5px;
    color:var(--gold-bright);
    text-shadow:0 0 18px rgba(240,213,134,0.35);
  }

  .brand .sub{
    font-family:'Oswald',sans-serif;
    font-size:11px;
    letter-spacing:2px;
    color:var(--text-muted);
    text-transform:uppercase;
    border-left:1px solid rgba(139,147,184,0.4);
    padding-left:10px;
  }

  .status-cluster{
    display:flex;
    align-items:center;
    gap:18px;
    font-family:'Oswald',sans-serif;
  }

  .on-air{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:12px;
    letter-spacing:1.5px;
    color:var(--live-red);
    font-weight:600;
  }
  .on-air .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--live-red);
    box-shadow:0 0 10px var(--live-red);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:0.4;transform:scale(0.75);}
  }

  .clock{
    font-size:14px;
    letter-spacing:1px;
    color:var(--text-primary);
    min-width:78px;
    text-align:right;
  }

  .break-countdown{
    font-size:11px;
    letter-spacing:1px;
    color:var(--text-muted);
    text-transform:uppercase;
  }
  .break-countdown span{color:var(--gold);}

  /* ---------- PLAYER ---------- */
  .stage{
    position:relative;
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    overflow:hidden;
  }

  video{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
  }

  /* start overlay */
  .start-overlay{
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at 50% 40%, rgba(24,36,80,0.9), var(--navy-950) 70%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:22px;
    z-index:20;
    text-align:center;
    padding:20px;
  }
  .start-overlay .word{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:clamp(32px,7vw,64px);
    letter-spacing:2px;
    color:var(--gold-bright);
    text-shadow:0 0 30px rgba(240,213,134,0.4);
  }
  .start-overlay .tag{
    font-family:'Oswald',sans-serif;
    font-size:13px;
    letter-spacing:4px;
    text-transform:uppercase;
    color:var(--text-muted);
  }
  .go-live-btn{
    font-family:'Oswald',sans-serif;
    font-size:14px;
    letter-spacing:2px;
    text-transform:uppercase;
    background:transparent;
    color:var(--gold-bright);
    border:1px solid var(--gold);
    padding:14px 34px;
    border-radius:2px;
    cursor:pointer;
    transition:background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
  }
  .go-live-btn:hover,
  .go-live-btn:focus-visible{
    background:var(--gold);
    color:var(--navy-950);
    box-shadow:0 0 24px rgba(201,162,75,0.5);
  }
  .go-live-btn:focus-visible{outline:2px solid var(--gold-bright);outline-offset:3px;}

  /* broadcast bug */
  .bug{
    position:absolute;
    bottom:18px;
    right:18px;
    font-family:'Oswald',sans-serif;
    font-size:12px;
    letter-spacing:1.5px;
    color:rgba(245,243,236,0.55);
    background:rgba(5,9,20,0.35);
    padding:5px 10px;
    border:1px solid rgba(201,162,75,0.35);
    border-radius:2px;
    z-index:10;
    pointer-events:none;
  }

  /* lower third */
  .lower-third{
    position:absolute;
    left:22px;
    bottom:64px;
    max-width:min(520px, 70%);
    z-index:10;
    opacity:0;
    transform:translateY(8px);
    transition:opacity 0.5s ease, transform 0.5s ease;
    pointer-events:none;
  }
  .lower-third.show{opacity:1;transform:translateY(0);}
  .lower-third .series{
    font-family:'Oswald',sans-serif;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:2px;
  }
  .lower-third .title{
    font-family:'Oswald',sans-serif;
    font-size:clamp(18px,2.6vw,26px);
    font-weight:600;
    color:var(--text-primary);
    background:rgba(5,9,20,0.55);
    padding:6px 12px;
    display:inline-block;
    border-left:3px solid var(--gold);
  }

  /* break badge */
  .break-badge{
    position:absolute;
    top:16px;
    left:50%;
    transform:translate(-50%,-16px);
    opacity:0;
    transition:opacity 0.4s ease, transform 0.4s ease;
    background:rgba(5,9,20,0.75);
    border:1px solid rgba(224,168,63,0.5);
    color:var(--break-amber);
    font-family:'Oswald',sans-serif;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    padding:7px 16px;
    border-radius:2px;
    z-index:11;
    pointer-events:none;
  }
  .break-badge.show{opacity:1;transform:translate(-50%,0);}

  /* ---------- TICKER / SCHEDULE ---------- */
  .schedule-bar{
    display:flex;
    align-items:center;
    gap:14px;
    padding:10px 22px;
    background:linear-gradient(0deg, rgba(10,17,40,0.95), rgba(10,17,40,0.75));
    border-top:1px solid rgba(201,162,75,0.18);
    z-index:5;
    overflow:hidden;
  }
  .schedule-label{
    font-family:'Oswald',sans-serif;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--gold);
    white-space:nowrap;
    flex-shrink:0;
  }
  .ticker-track{
    flex:1;
    overflow:hidden;
    white-space:nowrap;
    position:relative;
  }
  .ticker-inner{
    display:inline-block;
    padding-left:100%;
    animation:scroll-left 28s linear infinite;
    font-size:13px;
    color:var(--text-muted);
  }
  .ticker-inner span.next-item{
    color:var(--text-primary);
    font-weight:500;
  }
  .ticker-inner .sep{
    color:var(--gold);
    margin:0 14px;
  }
  @keyframes scroll-left{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
  }
</style>
</head>
<body>

<div class="channel">

  <header>
    <div class="brand">
      <div class="mark">STV</div>
      <div class="sub">Radiomeltdown</div>
    </div>
    <div class="status-cluster">
      <div class="break-countdown">Next break in <span id="breakCountdown">--:--</span></div>
      <div class="on-air"><span class="dot"></span>ON AIR</div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </header>

  <div class="stage">
    <video id="player" playsinline></video>

    <div class="break-badge" id="breakBadge">Commercial Break</div>
    <div class="lower-third" id="lowerThird">
      <div class="series" id="lowerSeries"></div>
      <div class="title" id="lowerTitle"></div>
    </div>
    <div class="bug">STV</div>

    <div class="start-overlay" id="startOverlay">
      <div class="word">STV RADIOMELTDOWN</div>
      <div class="tag">Lithonia, GA · Independent Radio &amp; TV</div>
      <button class="go-live-btn" id="goLiveBtn">Go Live</button>
    </div>
  </div>

  <div class="schedule-bar">
    <div class="schedule-label">Up Next</div>
    <div class="ticker-track">
      <div class="ticker-inner" id="tickerInner">Loading schedule…</div>
    </div>
  </div>

</div>

<script>
(async function(){

  // ---------- SOURCE DATA ----------
  // Single source of truth: /shows.json (repo root). Previously this was a
  // hardcoded copy that had to be kept in sync by hand with /watch/index.html
  // and the STUDIO dashboard's expected data file. Now every surface reads
  // the same file.
  const SHOWS_RAW = await fetch('/shows.json', { cache: 'no-store' })
    .then(res => res.json())
    .catch(err => {
      console.error('[STV] Failed to load /shows.json', err);
      return [];
    });

  const COMMERCIALS = [
    { id:"mack-magic-mobile-bar", title:"Mack Magic Mobile Bar", url:"https://res.cloudinary.com/dyqfcbgqo/video/upload/v1781930406/MMslide_eqqhtb.mp4" },
    { id:"mack-in-the-dark", title:"Mack Magic Mobile Bar", url:"https://res.cloudinary.com/dyqfcbgqo/video/upload/v1782972594/Mackinthedark_lut8nf.mp4" },
    { id:"soluv", title:"So Luv", url:"https://res.cloudinary.com/dyqfcbgqo/video/upload/v1782972584/soluv_thvauh.mp4" }
  ];

  // ---------- BUILD LINEAR QUEUE ----------
  function buildQueue(shows){
    const queue = [];
    shows.forEach(item=>{
      if (item.episodes && item.episodes.length){
        item.episodes.forEach(ep=>{
          queue.push({
            title: ep.title,
            series: item.title,
            url: ep.url,
            cover: ep.cover
          });
        });
      } else {
        queue.push({
          title: item.title,
          series: null,
          url: item.url,
          cover: item.cover
        });
      }
    });
    return queue;
  }

  const mainQueue = buildQueue(SHOWS_RAW);

  // ---------- STATE ----------
  let mainIndex = 0;
  let commercialIndex = 0;
  let isBreak = false;
  let savedTime = 0;
  let breakDoneThisHour = null;

  // ---------- DOM ----------
  const video = document.getElementById('player');
  const startOverlay = document.getElementById('startOverlay');
  const goLiveBtn = document.getElementById('goLiveBtn');
  const clockEl = document.getElementById('clock');
  const breakCountdownEl = document.getElementById('breakCountdown');
  const lowerThird = document.getElementById('lowerThird');
  const lowerSeries = document.getElementById('lowerSeries');
  const lowerTitle = document.getElementById('lowerTitle');
  const breakBadge = document.getElementById('breakBadge');
  const tickerInner = document.getElementById('tickerInner');

  // ---------- HELPERS ----------
  function pad(n){ return n.toString().padStart(2,'0'); }

  function usablePoster(url){
    if (!url) return '';
    return /\.heic($|\?)/i.test(url) ? '' : url;
  }

  function updateLowerThird(item){
    lowerSeries.textContent = item.series ? item.series : '';
    lowerSeries.style.display = item.series ? 'block' : 'none';
    lowerTitle.textContent = item.title;
    lowerThird.classList.remove('show');
    // retrigger fade
    void lowerThird.offsetWidth;
    lowerThird.classList.add('show');
  }

  function updateUpNext(){
    const upcoming = [];
    for (let i = 1; i <= 4; i++){
      upcoming.push(mainQueue[(mainIndex + i) % mainQueue.length]);
    }
    tickerInner.innerHTML = upcoming
      .map(it => `<span class="next-item">${it.series ? it.series + ' — ' : ''}${it.title}</span>`)
      .join('<span class="sep">•</span>');
  }

  function showBreakBadge(show){
    breakBadge.classList.toggle('show', show);
  }

  function loadMain(index){
    const item = mainQueue[index % mainQueue.length];
    const poster = usablePoster(item.cover);
    video.src = item.url;
    if (poster) video.poster = poster; else video.removeAttribute('poster');
    updateLowerThird(item);
    updateUpNext();
    video.play().catch(()=>{});
  }

  function resumeMain(){
    const item = mainQueue[mainIndex % mainQueue.length];
    const poster = usablePoster(item.cover);
    video.src = item.url;
    if (poster) video.poster = poster; else video.removeAttribute('poster');
    const seekOnce = () => {
      video.currentTime = savedTime;
      video.removeEventListener('loadedmetadata', seekOnce);
    };
    video.addEventListener('loadedmetadata', seekOnce);
    updateLowerThird(item);
    updateUpNext();
    video.play().catch(()=>{});
  }

  function playCommercial(){
    isBreak = true;
    savedTime = video.currentTime || 0;
    const ad = COMMERCIALS[commercialIndex % COMMERCIALS.length];
    commercialIndex++;
    video.removeAttribute('poster');
    video.src = ad.url;
    lowerThird.classList.remove('show');
    showBreakBadge(true);
    video.play().catch(()=>{});
  }

  // ---------- EVENTS ----------
  video.addEventListener('ended', () => {
    if (isBreak){
      isBreak = false;
      showBreakBadge(false);
      resumeMain();
    } else {
      mainIndex = (mainIndex + 1) % mainQueue.length;
      loadMain(mainIndex);
    }
  });

  goLiveBtn.addEventListener('click', () => {
    startOverlay.style.display = 'none';
    loadMain(mainIndex);
  });

  // ---------- CLOCK + HOURLY BREAK TRIGGER ----------
  function tick(){
    const now = new Date();
    clockEl.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

    const hour = now.getHours();
    const min = now.getMinutes();
    const sec = now.getSeconds();

    if (min === 0 && sec < 2 && breakDoneThisHour !== hour && !isBreak){
      breakDoneThisHour = hour;
      playCommercial();
    }
    if (min !== 0){
      // allow next hour's break to fire again once we've moved past :00
    }

    const secsToBreak = ((60 - min) % 60) * 60 - sec;
    const wrapped = secsToBreak <= 0 ? 3600 + secsToBreak : secsToBreak;
    const mm = Math.floor(wrapped / 60);
    const ss = wrapped % 60;
    breakCountdownEl.textContent = `${pad(mm)}:${pad(ss)}`;
  }
  tick();
  setInterval(tick, 1000);

  // initial ticker fill before playback starts
  updateUpNext();

})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STV STUDIO — Operator Console</title>

<style>
:root{
  --bg:#060a14;
  --panel:#0e1422;
  --border:rgba(255,255,255,0.08);
  --text:#f3f1ea;
  --muted:#a9adba;
  --gold:#c9a44c;
  --red:#ff3b4e;
  --green:#4fd18b;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  background:#0a0f1a;
}
.brand{font-weight:700; letter-spacing:2px}

.nav a{
  color:var(--muted);
  margin-right:10px;
  text-decoration:none;
  font-size:12px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  padding:12px;
}

.box{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  min-height:300px;
}

.header{
  padding:10px;
  font-size:12px;
  color:var(--muted);
  border-bottom:1px solid var(--border);
}

.body{padding:10px;height:100%}

iframe,video{
  width:100%;
  height:260px;
  border:0;
  background:black;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid var(--border);
  background:#111827;
  color:var(--text);
  cursor:pointer;
}

.btn.live{background:var(--red)}
.btn.talk.on{background:var(--green); color:#000}

/* QR */
#qrPanel{
  display:none;
  text-align:center;
  padding:10px;
}

/* MOBILE — stack the three panels instead of squeezing them side by side */
@media (max-width: 700px){
  .grid{
    grid-template-columns: 1fr;
  }
  .box{
    min-height:auto;
  }
  iframe,video{
    height:220px;
  }
  .topbar{
    flex-wrap:wrap;
    gap:6px;
  }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">STV STUDIO</div>
  <div class="nav">
    <a href="../watch.html">Viewer</a>
    <a href="oppdash.html">Dashboard</a>
  </div>
</div>

<div class="grid">

  <!-- CAMERA -->
  <div class="box">
    <div class="header">CAMERA</div>
    <div class="body">
      <video id="selfCam" autoplay muted playsinline></video>
      <button class="btn" id="camBtn">Enable Camera</button>
    </div>
  </div>

  <!-- VIEWER -->
  <div class="box">
    <div class="header">WHAT'S ON</div>
    <div class="body">
      <iframe src="../watch.html" id="viewerFrame"></iframe>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="box">
    <div class="header">CONTROL ROOM</div>
    <div class="body">

      <button class="btn live" id="goLive">GO LIVE</button>
      <button class="btn" id="talk">TALK</button>
      <button class="btn" id="standby">STANDBY</button>

      <button class="btn" id="qrBtn">QR</button>

      <div id="qrPanel">
        <img id="qrImg" width="180"/>
      </div>

    </div>
  </div>

</div>

<script>

const INVITE_LINK =
"https://invite.cam/U2FsdGVkX1+QMWbI16QX0ILSVj1jNeskyDKYX3E8G51ClAtp8s0PxmpGtDXJUKfWlotC+2reCVz8G6AQGUL2YQ==";

let stream = null;
let micEnabled = false;

/* CAMERA */
document.getElementById("camBtn").onclick = async () => {
  stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  document.getElementById("selfCam").srcObject = stream;
};

/* TALK BUTTON — REAL MIC CONTROL */
document.getElementById("talk").onclick = () => {
  if(!stream) return;

  micEnabled = !micEnabled;

  stream.getAudioTracks().forEach(t => {
    t.enabled = micEnabled;
  });

  const btn = document.getElementById("talk");
  btn.classList.toggle("on", micEnabled);
  btn.textContent = micEnabled ? "MIC LIVE" : "TALK";
};

/* LIVE / STANDBY */
document.getElementById("goLive").onclick = () => {
  window.open("https://vdo.ninja/?director=whatsthe411&roomkey=DfmbmuvdavLBPykP&showdirector","_blank");
};

document.getElementById("standby").onclick = () => {
  micEnabled = false;
  if(stream){
    stream.getAudioTracks().forEach(t=>t.enabled=false);
  }
  document.getElementById("talk").classList.remove("on");
  document.getElementById("talk").textContent="TALK";
};

/* QR */
document.getElementById("qrBtn").onclick = () => {
  const panel = document.getElementById("qrPanel");
  const img = document.getElementById("qrImg");

  const open = panel.style.display !== "block";
  panel.style.display = open ? "block" : "none";

  img.src =
    "https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=" +
    encodeURIComponent(INVITE_LINK);
};

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>STV On Air — Broadcast Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0b0b12;
  --panel:#15151f;
  --line:#262633;
  --gold:#f4c430;
  --red:#ff2d55;
  --text:#f2f0ea;
  --dim:#8d8a9c;
}

* { box-sizing:border-box; }

body {
  margin:0;
  font-family: DM Sans, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* HEADER */
.header {
  padding:18px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.brand {
  font-family:Bebas Neue;
  letter-spacing:.08em;
  font-size:22px;
}
.live {
  color:var(--gold);
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px;
}
.dot {
  width:8px;height:8px;border-radius:50%;
  background:var(--red);
  animation:pulse 1.5s infinite;
}
@keyframes pulse {50%{opacity:.3}}

/* MAIN GRID */
.grid {
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:12px;
  padding:12px;
}
@media(max-width:900px){
  .grid { grid-template-columns:1fr; }
}

.card {
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  overflow:hidden;
  min-height:320px;
}

/* VIDEO + IFRAME */
.media {
  position:relative;
  background:black;
}
video, iframe {
  width:100%;
  height:420px;
  border:0;
  background:black;
}

/* QR PANEL */
.qr {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:16px;
  gap:12px;
}
.qr img {
  width:220px;
  height:220px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.1);
}
.qr-title {
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--dim);
  text-align:center;
}

/* VDO PANEL */
.remote {
  padding:0;
}
.remote iframe {
  height:420px;
}

/* INFO */
.info {
  padding:14px;
}
.title {
  font-size:18px;
  font-weight:700;
}
.meta {
  color:var(--dim);
  font-size:13px;
  margin-top:6px;
}

/* QR ACTION BUTTON */
.btn {
  margin-top:10px;
  display:inline-block;
  padding:10px 14px;
  border-radius:6px;
  border:1px solid var(--line);
  color:var(--text);
  text-decoration:none;
  font-size:12px;
  text-align:center;
}
.btn:hover {
  border-color:var(--gold);
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="brand">STV ON AIR CONSOLE</div>
  <div class="live"><span class="dot"></span> LIVE</div>
</div>

<!-- MAIN GRID -->
<div class="grid">

  <!-- LEFT: LIVE MEDIA -->
  <div class="card media">
    <video id="player" autoplay muted controls></video>
  </div>

  <!-- RIGHT: INFO STACK -->
  <div class="card info">

    <div class="title">WHAT'S ON NOW</div>
    <div class="meta" id="meta">Standby Feed</div>

    <hr style="border:0;border-top:1px solid #262633;margin:12px 0;">

    <!-- QR BLOCK -->
    <div class="qr">
      <div class="qr-title">JOIN BY PHONE / TABLET</div>

      <img
        src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://invite.cam/U2FsdGVkX1%2BQMWbI16QX0ILSVj1jNeskyDKYX3E8G51ClAtp8s0PxmpGtDXJUKfWlotC%2B2reCVz8G6AQGUL2YQ%3D%3D"
        alt="QR Join Code"
      />

      <a class="btn"
         href="https://invite.cam/U2FsdGVkX1+QMWbI16QX0ILSVj1jNeskyDKYX3E8G51ClAtp8s0PxmpGtDXJUKfWlotC+2reCVz8G6AQGUL2YQ=="
         target="_blank">
        Open Invite Link
      </a>
    </div>

  </div>

  <!-- BOTTOM RIGHT: REMOTE FEED -->
  <div class="card remote">
    <iframe
      src="https://vdo.ninja/?scene&room=whatsthe411&roomkey=DfmbmuvdavLBPykP&sas&sl"
      allow="camera; microphone; autoplay"
    ></iframe>
  </div>

</div>

<script>
/* ---- HARD STATE HOOK (for your MEDIA engine later) ---- */
const MEDIA_STATE = {
  current: null
};

function setNowPlaying(title = "Live Feed", sub = "Broadcast Active") {
  document.getElementById("meta").textContent = `${title} • ${sub}`;
}

/* Example starter hook */
setNowPlaying("STV LIVE CONSOLE", "VDO.Ninja Ingest Active");
</script>

</body>
</html>

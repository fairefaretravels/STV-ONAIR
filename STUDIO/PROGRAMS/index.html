<div id="studio-player" class="studio-player">
  <div class="now-playing">
    <span id="track-title">Loading tracks...</span>
  </div>
  <audio id="audio-el"></audio>
  <div class="player-controls">
    <button id="prev-btn">⏮</button>
    <button id="play-btn">▶</button>
    <button id="next-btn">⏭</button>
    <button id="shuffle-btn" class="active">🔀 Shuffle</button>
  </div>
</div>

<style>
.studio-player {
  background: #0a0a0a;
  border: 1px solid #d4af37;
  padding: 20px;
  font-family: 'DM Sans', sans-serif;
  color: #fff;
}
.now-playing {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 1px;
  color: #d4af37;
  margin-bottom: 12px;
}
.player-controls button {
  background: transparent;
  border: 1px solid #d4af37;
  color: #d4af37;
  padding: 8px 14px;
  margin-right: 8px;
  cursor: pointer;
  font-size: 14px;
}
.player-controls button.active { background: #d4af37; color: #000; }
</style>

<script>
(function() {
  const OWNER = 'fairefaretravels';
  const REPO = 'STV-ONAIR';
  const PATH = 'PROGRAMS/audio'; // adjust to wherever your mp3s actually live
  const BRANCH = 'main';

  let playlist = [];
  let currentIndex = 0;
  let shuffleOn = true;

  const audioEl = document.getElementById('audio-el');
  const titleEl = document.getElementById('track-title');
  const playBtn = document.getElementById('play-btn');
  const shuffleBtn = document.getElementById('shuffle-btn');

  async function loadPlaylist() {
    try {
      const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}?ref=${BRANCH}`);
      const files = await res.json();
      playlist = files
        .filter(f => /\.(mp3|wav|m4a)$/i.test(f.name))
        .map(f => ({ name: f.name.replace(/\.[^/.]+$/, ''), url: f.download_url }));

      if (shuffleOn) shufflePlaylist();
      if (playlist.length) loadTrack(0);
      else titleEl.textContent = 'No tracks found';
    } catch (err) {
      titleEl.textContent = 'Error loading tracks';
      console.error(err);
    }
  }

  function shufflePlaylist() {
    for (let i = playlist.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [playlist[i], playlist[j]] = [playlist[j], playlist[i]];
    }
  }

  function loadTrack(index) {
    currentIndex = (index + playlist.length) % playlist.length;
    const track = playlist[currentIndex];
    audioEl.src = track.url;
    titleEl.textContent = track.name;
  }

  function playTrack() {
    audioEl.play();
    playBtn.textContent = '⏸';
  }

  playBtn.addEventListener('click', () => {
    if (audioEl.paused) { playTrack(); }
    else { audioEl.pause(); playBtn.textContent = '▶'; }
  });

  document.getElementById('next-btn').addEventListener('click', () => {
    loadTrack(currentIndex + 1); playTrack();
  });
  document.getElementById('prev-btn').addEventListener('click', () => {
    loadTrack(currentIndex - 1); playTrack();
  });
  shuffleBtn.addEventListener('click', () => {
    shuffleOn = !shuffleOn;
    shuffleBtn.classList.toggle('active', shuffleOn);
    if (shuffleOn) shufflePlaylist();
  });
  audioEl.addEventListener('ended', () => { loadTrack(currentIndex + 1); playTrack(); });

  loadPlaylist();
})();
</script>

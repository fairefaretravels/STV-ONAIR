<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashback — Split Screen Layout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0c0f14;
    --panel: #12161d;
    --panel-2: #171c25;
    --line: #232a36;
    --amber: #ffb100;
    --teal: #2dd4bf;
    --red: #ff4d4f;
    --text: #e8eaed;
    --muted: #8a93a6;
    --mono: 'IBM Plex Mono', monospace;
    --display: 'Oswald', sans-serif;
    --body: 'Inter', sans-serif;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
  }

  .page{
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  .eyebrow{
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--teal);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1{
    font-family: var(--display);
    font-size: 30px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 0 0 22px;
  }

  /* ---------- STREAM FRAME ---------- */
  .frame{
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--panel);
    border: 1px solid var(--line);
    display: flex;
    overflow: hidden;
  }

  .cam-panel{
    width: 34%;
    background: var(--panel-2);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px;
  }

  .avatar{
    width: 30%;
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    background: var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .avatar img{
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .avatar svg{ width: 46%; height: 46%; stroke: var(--muted); }

  .host-name{
    font-family: var(--display);
    font-size: 16px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    text-align: center;
  }
  .host-sub{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 2px;
  }

  .waveform{
    display:flex;
    align-items: flex-end;
    gap: 3px;
    height: 20px;
  }
  .waveform span{
    width: 3px;
    background: var(--amber);
    border-radius: 1px;
    animation: bounce 1.1s infinite ease-in-out;
  }
  .waveform span:nth-child(1){ height: 40%; animation-delay: 0s; }
  .waveform span:nth-child(2){ height: 90%; animation-delay: 0.1s; }
  .waveform span:nth-child(3){ height: 60%; animation-delay: 0.2s; }
  .waveform span:nth-child(4){ height: 100%; animation-delay: 0.3s; }
  .waveform span:nth-child(5){ height: 50%; animation-delay: 0.4s; }
  .waveform span:nth-child(6){ height: 75%; animation-delay: 0.5s; }
  @keyframes bounce{
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }
  @media (prefers-reduced-motion: reduce){
    .waveform span{ animation: none; }
  }

  .screen-panel{
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .browser-bar{
    height: 26px;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px;
  }
  .browser-bar .dot{ width: 7px; height: 7px; border-radius: 50%; }
  .browser-bar .dot.red{ background: var(--red); }
  .browser-bar .dot.amber{ background: var(--amber); }
  .browser-bar .dot.teal{ background: var(--teal); }
  .browser-bar .label{
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
  }

  .screen-content{
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #3a4150;
  }
  .screen-content svg{ width: 52px; height: 52px; stroke: currentColor; }

  .lower-third{
    position: absolute;
    left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: rgba(12,15,20,0.9);
    border-top: 1px solid var(--line);
  }
  .on-air-dot{
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 6px 1px rgba(255,77,79,0.7);
    animation: blink 2.2s infinite ease-in-out;
    flex-shrink: 0;
  }
  @keyframes blink{ 0%,100%{opacity:1;} 50%{opacity:0.25;} }

  .segment-tag{
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--amber);
    padding: 4px 9px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .segment-name{
    font-family: var(--body);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  /* ---------- CAPTION ---------- */
  .caption-row{
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* ---------- SEGMENT CONTROLS ---------- */
  .controls{
    margin-top: 40px;
  }
  .controls h2{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 12px;
    font-weight: 500;
  }
  .segment-grid{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .segment-grid button{
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.5px;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 9px 14px;
    cursor: pointer;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .segment-grid button:hover{
    border-color: var(--amber);
    color: var(--amber);
  }
  .segment-grid button.active{
    border-color: var(--amber);
    color: var(--bg);
    background: var(--amber);
  }

  footer{
    margin-top: 44px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="page">

  <div class="eyebrow"> Saneca TV / Live</div>
  <h1>Split screen layout</h1>

  <div class="frame">
    <div class="cam-panel">
      <div class="avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <div>
        <div class="host-name">Mack</div>
        <div class="host-sub">voice only · no camera</div>
      </div>
      <div class="waveform">
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="screen-panel">
      <div class="browser-bar">
        <span class="dot red"></span>
        <span class="dot amber"></span>
        <span class="dot teal"></span>
        <span class="label">STV LIVE</span>
      </div>
      <div class="screen-content">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polygon points="10 8 16 12 10 16 10 8"></polygon>
        </svg>
      </div>
    </div>

    <div class="lower-third">
      <span class="on-air-dot"></span>
      <span class="segment-tag">Segment</span>
      <span class="segment-name" id="segmentName">Storyline</span>
    </div>
  </div>

  <div class="caption-row">
    <span>Left — photo + voice, VDO Ninja feed</span>
    <span>Right — screen share</span>
  </div>

  <div class="controls">
    <h2>Switch lower third</h2>
    <div class="segment-grid" id="segmentGrid"></div>
  </div>

  <footer>Overlay</footer>
</div>

<script>
const segments = [
  "Timeout Sports Talk",
  "sysTEM",
  "Movie Review",
  "Where's The Good Food",
  "Hoopty Talk",
  "Fashun Luva",
  "DIY",
  "Storytime",
  "Moments In Music",
];

const grid = document.getElementById('segmentGrid');
const segmentName = document.getElementById('segmentName');

segments.forEach((name, i) => {
  const btn = document.createElement('button');
  btn.textContent = name;
  if (i === 4) btn.classList.add('active'); // Storyline shown by default
  btn.addEventListener('click', () => {
    segmentName.textContent = name;
    grid.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  grid.appendChild(btn);
});
</script>

</body>
</html>
